name: JavaScript tests

on:
  push:
    branches: [develop]

  pull_request:
    branches: [develop]

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test "tests/js/*.test.mjs"
